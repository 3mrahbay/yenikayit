  apiKey: "AIzaSyARlqAoh-HRBC9xPwj7qRgG-IuZFSH39Uc",

firebase.initializeApp(FIREBASE_CONFIG);

let kayitlar = { yeni: [], yenileme: [] };

function log(msg, type = "info") {
  const box = document.getElementById("logBox");
  const div = document.createElement("div");
  div.className = "log-line log-" + type;
  div.textContent = "[" + new Date().toLocaleTimeString("tr-TR") + "] " + msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function girisYap() {
  const p = new firebase.auth.GoogleAuthProvider();
  p.setCustomParameters({ prompt: "select_account" });
  auth.signInWithPopup(p).catch(e => alert("Giriş hatası: " + e.message));
}

auth.onAuthStateChanged(user => {
  if (!user) return;
  if (user.email !== ADMIN_EMAIL) {
    alert("⛔ Erişim yetkiniz yok. Sadece " + ADMIN_EMAIL);
    auth.signOut();
    return;
  }
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("mainBox").style.display = "block";
  log("✓ Giriş başarılı: " + user.email, "success");
  kayitlariGetir();
});

async function kayitlariGetir() {
  const bugun = new Date();
  bugun.setHours(0, 0, 0, 0);
  const bugunISO = bugun.toISOString();
  
  log("📋 Bugünkü kayıtlar çekiliyor...", "info");
  
  // yenikayit
  try {
    const snap1 = await db.collection("yenikayit")
      .where("kayitTarihi", ">=", bugunISO)
      .get();
    kayitlar.yeni = [];
    snap1.forEach(doc => {
      const d = doc.data();
      if (!d.mailGonderildi) {
        kayitlar.yeni.push({ id: doc.id, ...d });
      }
    });
    log("✓ yenikayit: " + kayitlar.yeni.length + " mail bekleyen kayıt", "success");
  } catch (e) {
    log("✗ yenikayit hatası: " + e.message, "error");
  }

  // kayityenileme
  try {
    const snap2 = await db.collection("kayitYenileme")
      .where("kayitTarihi", ">=", bugunISO)
      .get();
    kayitlar.yenileme = [];
    snap2.forEach(doc => {
      const d = doc.data();
      if (!d.mailGonderildi) {
        kayitlar.yenileme.push({ id: doc.id, ...d });
      }
    });
    log("✓ kayityenileme: " + kayitlar.yenileme.length + " mail bekleyen kayıt", "success");
  } catch (e) {
    log("✗ kayityenileme hatası: " + e.message, "error");
  }

  render();
}

function render() {
  document.getElementById("yeniCount").textContent = kayitlar.yeni.length;
  document.getElementById("yenilemeCount").textContent = kayitlar.yenileme.length;

  const yeniList = document.getElementById("yeniList");
  yeniList.innerHTML = kayitlar.yeni.length === 0
    ? '<div class="empty">Bugün mail gönderilmemiş yeni kayıt yok</div>'
    : kayitlar.yeni.map(k => rowHTML(k, "yeni")).join("");

  const yenilemeList = document.getElementById("yenilemeList");
  yenilemeList.innerHTML = kayitlar.yenileme.length === 0
    ? '<div class="empty">Bugün mail gönderilmemiş yenileme kaydı yok</div>'
    : kayitlar.yenileme.map(k => rowHTML(k, "yenileme")).join("");
}

function rowHTML(k, tip) {
  const ad = (k.veliAd || "") + " " + (k.veliSoyad || "");
  const cocuk = (k.childAd || "") + " " + (k.childSoyad || "");
  const saat = k.kayitTarihi ? new Date(k.kayitTarihi).toLocaleTimeString("tr-TR", {hour:"2-digit", minute:"2-digit"}) : "";
  return `<div class="row" id="row-${tip}-${k.id}">
    <div class="row-info">
      <div class="row-name">${ad} <span style="color:#888;font-weight:400;">→ ${cocuk}</span></div>
      <div class="row-details">📧 ${k.email} · 📞 ${k.phone || "-"} · 🕐 ${saat}</div>
    </div>
    <span class="status status-pending" id="status-${tip}-${k.id}">⏳ Bekliyor</span>
    <button class="action-btn" onclick="tekGonder('${tip}','${k.id}')" id="btn-${tip}-${k.id}" style="margin-left:12px;">📧 Gönder</button>
  </div>`;
}

async function brevoMail(opts) {
  try {
    const payload = {
      origin: window.location.hostname,
      to: opts.to,
      toName: opts.toName || "",
      subject: opts.subject,
      htmlContent: opts.htmlContent,
      replyTo: opts.replyTo || SCHOOL_EMAIL,
      replyToName: opts.replyToName || "Bir Çiçek Koleji",
      senderName: "Bir Çiçek Koleji Anaokulu",
      senderEmail: SCHOOL_EMAIL
    };
    const response = await fetch(BREVO_PROXY_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const text = await response.text();
    const result = JSON.parse(text);
    return result;
  } catch (e) {
    return { success: false, error: e.message };
  }
}

async function tekGonder(tip, id) {
  const kayit = (tip === "yeni" ? kayitlar.yeni : kayitlar.yenileme).find(k => k.id === id);
  if (!kayit) return;
  
  const btn = document.getElementById("btn-" + tip + "-" + id);
  const status = document.getElementById("status-" + tip + "-" + id);
  btn.disabled = true;
  btn.textContent = "⏳ Gönderiliyor...";
  status.className = "status status-pending";
  status.textContent = "⏳ Gönderiliyor";

  log("→ " + kayit.email + " için gönderim başladı...", "info");

  const cocukAdi = (kayit.childAd||"") + " " + (kayit.childSoyad||"");
  
  // 1) Okul maili
  const okulResult = await brevoMail({
    to: SCHOOL_EMAIL,
    toName: "Bir Çiçek Koleji Yönetim",
    subject: "🌸 Yeni Kayıt Başvurusu — " + cocukAdi,
    htmlContent: okulMailHTML(kayit),
    replyTo: kayit.email,
    replyToName: (kayit.veliAd||"") + " " + (kayit.veliSoyad||"")
  });
  
  await new Promise(r => setTimeout(r, 500)); // Brevo rate limit'e takılmamak için
  
  // 2) Veli maili
  const veliResult = await brevoMail({
    to: kayit.email,
    toName: (kayit.veliAd||"") + " " + (kayit.veliSoyad||""),
    subject: "🌸 Bir Çiçek Koleji Ön Kayıt Başvurunuz Alındı",
    htmlContent: veliMailHTML(kayit)
  });

  if (okulResult.success && veliResult.success) {
    // Firestore'a flag yaz
    try {
      const coll = tip === "yeni" ? "yenikayit" : "kayitYenileme";
      await db.collection(coll).doc(id).update({
        mailGonderildi: true,
        mailGonderildiTarih: new Date().toISOString()
      });
    } catch(e) {
      log("⚠ Firestore flag yazılamadı: " + e.message, "error");
    }
    
    status.className = "status status-sent";
    status.textContent = "✓ Gönderildi";
    btn.textContent = "✓ Tamam";
    btn.style.background = "#10B981";
    log("✓ " + kayit.email + " — mail gitti (okul + veli)", "success");
  } else {
    status.className = "status status-error";
    status.textContent = "✗ Hata";
    btn.disabled = false;
    btn.textContent = "🔄 Tekrar Dene";
    log("✗ " + kayit.email + " — okul:" + (okulResult.success?"✓":okulResult.error) + " | veli:" + (veliResult.success?"✓":veliResult.error), "error");
  }
}

async function tumunuGonder() {
  const bulkBtn = document.getElementById("bulkBtn");
  if (!confirm("Toplam " + (kayitlar.yeni.length + kayitlar.yenileme.length) + " veliye mail gönderilecek. Devam?")) return;
  
  bulkBtn.disabled = true;
  bulkBtn.textContent = "⏳ Gönderiliyor...";
  
  log("═══ Toplu gönderim başladı ═══", "info");
  
  for (const k of kayitlar.yeni) {
    await tekGonder("yeni", k.id);
    await new Promise(r => setTimeout(r, 1500)); // kayıtlar arası bekleme
  }
  
  for (const k of kayitlar.yenileme) {
    await tekGonder("yenileme", k.id);
    await new Promise(r => setTimeout(r, 1500));
  }
  
  log("═══ Toplu gönderim bitti ═══", "success");
  bulkBtn.disabled = false;
  bulkBtn.textContent = "📧 Listedeki Herkese Mail Gönder";
}
</script>
</body>
</html>
